<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BD Rail Bot</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a; /* Slate 900 */
            --card-bg: #1e293b; /* Slate 800 */
            --primary: #10b981; /* Emerald 500 */
            --primary-hover: #059669; /* Emerald 600 */
            --accent: #ef4444; /* Red 500 */
            --text-main: #f8fafc; /* Slate 50 */
            --text-muted: #94a3b8; /* Slate 400 */
            --border-color: #334155; /* Slate 700 */
            --input-bg: #0f172a;
        }

        body {
            width: 340px;
            margin: 0;
            padding: 20px;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            box-sizing: border-box;
        }

        /* Header / Logo */
        .header {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            gap: 10px;
        }

        .header h2 {
            margin: 0;
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .header-icon {
            width: 28px;
            height: 28px;
            background: rgba(16, 185, 129, 0.15);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        /* Clock Widget */
        .clock-widget {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 18px 16px;
            text-align: center;
            margin-bottom: 24px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3), 0 4px 6px -2px rgba(0, 0, 0, 0.15);
            position: relative;
            overflow: hidden;
        }

        .clock-widget::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 3px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
        }

        .time-display {
            font-family: 'Space Mono', monospace;
            font-size: 34px;
            font-weight: 700;
            color: #fff;
            text-shadow: 0 0 15px rgba(16, 185, 129, 0.6);
            letter-spacing: -1.5px;
            margin-bottom: 6px;
        }

        .time-label {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        /* Form Configuration */
        .config-section {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 24px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
        }

        .section-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-main);
            margin: 0 0 18px 0;
            display: flex;
            align-items: center;
            gap: 8px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-color);
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group:last-child {
            margin-bottom: 0;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper input {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 10px 12px;
            border-radius: 8px;
            font-size: 13px;
            font-family: 'Inter', sans-serif;
            box-sizing: border-box;
            transition: all 0.2s ease;
            outline: none;
        }

        .input-wrapper input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.15);
        }

        .input-wrapper input::placeholder {
            color: #475569;
        }

        /* Delay Input with Badge */
        .delay-wrapper {
            display: flex;
            align-items: center;
        }
        
        .delay-wrapper input {
            border-radius: 8px 0 0 8px;
            border-right: none;
        }
        
        .delay-badge {
            background: var(--border-color);
            color: var(--text-muted);
            padding: 10px 14px;
            font-size: 13px;
            border-radius: 0 8px 8px 0;
            border: 1px solid var(--border-color);
            font-weight: 500;
        }

        /* Action Button */
        .btn-start {
            width: 100%;
            background: linear-gradient(135deg, var(--accent), #dc2626);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
            transition: all 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            letter-spacing: 0.5px;
        }

        .btn-start:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(239, 68, 68, 0.4);
            background: linear-gradient(135deg, #dc2626, #b91c1c);
        }

        .btn-start:active {
            transform: translateY(1px);
            box-shadow: 0 2px 8px rgba(239, 68, 68, 0.3);
        }

        .btn-icon {
            width: 18px;
            height: 18px;
        }

        /* Footer Note */
        .footer-note {
            text-align: center;
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .pulse-dot {
            width: 6px;
            height: 6px;
            background-color: var(--primary);
            border-radius: 50%;
            box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { box-shadow: 0 0 0 6px rgba(16, 185, 129, 0); }
            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }
    </style>
</head>

<body>
    <!-- Header -->
    <div class="header">
        <div class="header-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"></path><line x1="4" y1="22" x2="4" y2="15"></line></svg>
        </div>
        <h2>BD Rail Bot</h2>
    </div>

    <!-- Clock Widget -->
    <div class="clock-widget">
        <div class="time-display" id="bd-time">--:--:--</div>
        <div class="time-label">Bangladesh Standard Time</div>
    </div>

    <!-- Form Configuration -->
    <div class="config-section">
        <div class="section-title">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--primary)"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
            Auto Booker Settings
        </div>

        <div class="form-group">
            <label for="trainName">Target Train (Partial Match)</label>
            <div class="input-wrapper">
                <input type="text" id="trainName" placeholder="e.g. PARABAT" autocomplete="off" spellcheck="false">
            </div>
        </div>

        <div class="form-group">
            <label for="className">Seat Class (Exact Match)</label>
            <div class="input-wrapper">
                <input type="text" id="className" placeholder="e.g. S_CHAIR" autocomplete="off" spellcheck="false">
            </div>
        </div>

        <div class="form-group">
            <label for="delay">Action Delay (Increase if slow net)</label>
            <div class="delay-wrapper">
                <input type="number" id="delay" value="500" min="100" max="5000">
                <div class="delay-badge">ms</div>
            </div>
        </div>
    </div>

    <!-- Action -->
    <button id="startBtn" class="btn-start">
        <svg class="btn-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
        START AUTOBOT
    </button>

    <div class="footer-note">
        <div class="pulse-dot"></div>
        Open search results page before starting
    </div>

    <script src="popup.js"></script>
</body>

</html>
